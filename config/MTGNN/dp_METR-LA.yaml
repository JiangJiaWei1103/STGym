# Configuration for data processing
# ==Data Processing==
dp:
    # Holdout (fixed)
    holdout_ratio: 0.2

    # Scaling
    scaling: standard

    # Priori graph structure
    priori_gs:
        type: null
        k: null

# ==CV Scheme==
cv:
    scheme: tssplit
    n_folds: 1
    train_ratio: 0.875
    val_ratio: 0.125

# ==Dataset==
dataset:
    name: metr_la
    t_window: 12
    horizon: 12

    # Number of time slots in one day
    n_tids: 288

    # If True, add "Day in week" identifier as the auxiliary feature
    add_tid: True
    add_diw: False
