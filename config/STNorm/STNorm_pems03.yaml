# Configuration file for model architecture `STNorm`
model_params:
    # Spatial/Temporal Convolution Module
    st_params:
        blocks: 1
        layers: 4
        # Spatial
        n_series: 358
        # Temporal
        dilation_exponential: 2
        kernel_size: 2
        t_window: 12
    # input/output channels
    ch_params:
        hid_channels: 32
        in_channels: 2
    # ST-Norm
    stnorm_params:
        tnorm_bool: True
        snorm_bool: True
    out_len: 12

fit_params: