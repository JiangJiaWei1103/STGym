# Configuration file for model architecture `GTS`
model_params:
    # Spatial/Temporal pattern extractor
    st_params:
        num_layers: 1
        rnn_units: 64
        out_dim: 1
        encoder_input_dim: 2
        decoder_input_dim: 1
        max_diffusion_step: 3
        n_series: 883
        temperature: 0.5
        cl_decay_steps: 2000
        use_curriculum_learning: True  
    # Node features
    nf_params:
        train_ratio: 0.6
        dataset_name: pems07
        k: 10
    batch_size: 8
    device: 'cuda:0'
    out_len: 12

fit_params: