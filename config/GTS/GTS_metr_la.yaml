# Configuration file for model architecture `GTS`
model_params:
    # Spatial/Temporal pattern extractor
    st_params:
        num_layers: 1
        n_series: 207
        rnn_units: 64
        dim_fc: 383552
        encoder_input_dim: 2
        decoder_input_dim: 1
        out_channels: 1
        max_diffusion_step: 3
        cl_decay_steps: 2000
        use_curriculum_learning: True
        temperature: 0.5
    # Node features
    nf_params:
        dataset_name: metr_la
        train_ratio: 0.7
        k: 10
        
    batch_size: 64
    device: 'cuda:0'
    out_dim: 12

